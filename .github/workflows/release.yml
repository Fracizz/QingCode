name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build (e.g. v0.1.0). Leave empty to use package.json version and create/update a draft.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  # New tag/dispatch cancels any in-flight Release for the same ref (avoids stacked Gitee uploads).
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      draft: ${{ steps.meta.outputs.draft }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read app version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          CONF=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO=$(grep -E '^version\s*=\s*"' src-tauri/Cargo.toml | head -n1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [[ "$VERSION" != "$CONF" || "$VERSION" != "$CARGO" ]]; then
            echo "Version mismatch: package=$VERSION tauri=$CONF cargo=$CARGO" >&2
            exit 1
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="v${VERSION}"
          fi
          [[ "$TAG" == v* ]] || TAG="v${TAG}"
          if [[ "$TAG" != "v${VERSION}" ]]; then
            echo "Tag $TAG does not match package version v${VERSION}" >&2
            exit 1
          fi
          DRAFT=false
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -z "${{ inputs.tag }}" ]]; then
            DRAFT=true
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "draft=${DRAFT}" >> "$GITHUB_OUTPUT"

  check:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Match package.json "packageManager" (do not pin a different major here).
          version: 11.0.8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Check (tsc, vitest, rustfmt, clippy, cargo test)
        run: pnpm check

  build-windows-x64:
    needs: [meta, check]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Match package.json "packageManager" (do not pin a different major here).
          version: 11.0.8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: windows-x64

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build portable exe (x64)
        shell: pwsh
        run: ./scripts/package-exe.ps1 -Force

      - name: Build NSIS installer (x64)
        shell: pwsh
        run: ./scripts/package-installer.ps1 -Force -SkipFrontend

      - name: Smoke start
        shell: pwsh
        run: ./scripts/smoke-start.ps1 -ExePath release/QingCode.exe -WaitSeconds 4

      - name: Stage artifacts
        shell: pwsh
        run: |
          $ver = '${{ needs.meta.outputs.version }}'
          New-Item -ItemType Directory -Force -Path dist-release | Out-Null
          # One file per platform/channel — no unversioned / legacy aliases.
          Copy-Item "release/QingCode_$ver.exe" "dist-release/QingCode_$ver-windows-x64.exe"
          Copy-Item "release/QingCode_$ver-setup.exe" "dist-release/QingCode_$ver-windows-x64-setup.exe"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist-release/*
          if-no-files-found: error

  build-windows-arm64:
    needs: [meta, check]
    # Public repos only (GitHub-hosted Windows ARM preview).
    runs-on: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Match package.json "packageManager" (do not pin a different major here).
          version: 11.0.8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: windows-arm64

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build portable exe (arm64)
        shell: pwsh
        run: ./scripts/package-exe.ps1 -Force -Target aarch64-pc-windows-msvc

      - name: Build NSIS installer (arm64)
        shell: pwsh
        run: ./scripts/package-installer.ps1 -Force -SkipFrontend -Target aarch64-pc-windows-msvc

      - name: Smoke start
        shell: pwsh
        run: ./scripts/smoke-start.ps1 -ExePath release/QingCode-windows-arm64.exe -WaitSeconds 4

      - name: Stage artifacts
        shell: pwsh
        run: |
          $ver = '${{ needs.meta.outputs.version }}'
          New-Item -ItemType Directory -Force -Path dist-release | Out-Null
          Copy-Item "release/QingCode_$ver-windows-arm64.exe" "dist-release/"
          Copy-Item "release/QingCode_$ver-windows-arm64-setup.exe" "dist-release/"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm64
          path: dist-release/*
          if-no-files-found: error

  build-macos-arm64:
    needs: [meta, check]
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Match package.json "packageManager" (do not pin a different major here).
          version: 11.0.8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: macos-arm64

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS arm64 (dmg + app zip)
        run: |
          chmod +x ./scripts/package-macos.sh
          ./scripts/package-macos.sh --force

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          VER='${{ needs.meta.outputs.version }}'
          mkdir -p dist-release
          cp -f "release/QingCode_${VER}-macos-arm64.dmg" dist-release/
          cp -f "release/QingCode_${VER}-macos-arm64.zip" dist-release/
          ls -la dist-release
          test -n "$(ls -A dist-release)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist-release/*
          if-no-files-found: error

  publish:
    needs: [meta, build-windows-x64, build-windows-arm64, build-macos-arm64]
    runs-on: windows-latest
    env:
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        shell: pwsh
        run: Get-ChildItem -Recurse release-assets | Format-Table FullName, Length

      - name: Prepare release notes (CN/EN)
        id: notes
        shell: pwsh
        run: |
          $ver = '${{ needs.meta.outputs.version }}'
          $tag = '${{ needs.meta.outputs.tag }}'
          $src = "docs/release-notes/$tag.md"
          $out = 'release-notes.md'
          if (Test-Path -LiteralPath $src) {
            Copy-Item -LiteralPath $src -Destination $out -Force
            Write-Host "Using $src"
          } else {
            @"
          ## QingCode v$ver

          ### 中文
          多平台构建（macOS 未签名：首次请右键 → 打开）。Windows 需安装 WebView2。

          | 平台 | 文件 |
          |------|------|
          | Windows x64 便携 | ``QingCode_${ver}-windows-x64.exe`` |
          | Windows x64 安装包 | ``QingCode_${ver}-windows-x64-setup.exe`` |
          | Windows ARM64 便携 | ``QingCode_${ver}-windows-arm64.exe`` |
          | Windows ARM64 安装包 | ``QingCode_${ver}-windows-arm64-setup.exe`` |
          | macOS Apple Silicon | ``QingCode_${ver}-macos-arm64.dmg`` / ``.zip`` |

          完整说明见 [CHANGELOG.md](https://github.com/Fracizz/QingCode/blob/master/CHANGELOG.md)。

          ---

          ### English
          Multi-platform builds (unsigned macOS: right-click → Open the first time). WebView2 required on Windows.

          | Platform | File |
          |----------|------|
          | Windows x64 portable | ``QingCode_${ver}-windows-x64.exe`` |
          | Windows x64 installer | ``QingCode_${ver}-windows-x64-setup.exe`` |
          | Windows ARM64 portable | ``QingCode_${ver}-windows-arm64.exe`` |
          | Windows ARM64 installer | ``QingCode_${ver}-windows-arm64-setup.exe`` |
          | macOS Apple Silicon | ``QingCode_${ver}-macos-arm64.dmg`` / ``.zip`` |

          Full notes: [CHANGELOG.en.md](https://github.com/Fracizz/QingCode/blob/master/CHANGELOG.en.md).

          Gitee mirror: https://gitee.com/FrancizTest_admin/qing-code/releases
          "@.Trim() | Set-Content -LiteralPath $out -Encoding utf8
            Write-Host "Generated fallback notes (missing $src)"
          }
          echo "path=$out" >> $env:GITHUB_OUTPUT

      - name: Prune obsolete GitHub assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ver = '${{ needs.meta.outputs.version }}'
          $tag = '${{ needs.meta.outputs.tag }}'
          $keep = @(
            "QingCode_${ver}-windows-x64.exe",
            "QingCode_${ver}-windows-x64-setup.exe",
            "QingCode_${ver}-windows-arm64.exe",
            "QingCode_${ver}-windows-arm64-setup.exe",
            "QingCode_${ver}-macos-arm64.dmg",
            "QingCode_${ver}-macos-arm64.zip"
          )
          # Native `gh` exit codes are not PowerShell exceptions — check LASTEXITCODE.
          $viewJson = gh release view $tag --json assets 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No existing GitHub release for $tag (first publish)."
            exit 0
          }
          $existing = @()
          if (-not [string]::IsNullOrWhiteSpace($viewJson)) {
            $parsed = $viewJson | ConvertFrom-Json
            $existing = @($parsed.assets | ForEach-Object { [string]$_.name })
          }
          foreach ($name in $existing) {
            if ([string]::IsNullOrWhiteSpace($name)) { continue }
            if ($keep -contains $name) { continue }
            Write-Host "Removing obsolete asset: $name"
            gh release delete-asset $tag $name --yes
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to delete obsolete asset: $name"
            }
          }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: QingCode v${{ needs.meta.outputs.version }}
          draft: ${{ needs.meta.outputs.draft == 'true' }}
          generate_release_notes: true
          body_path: ${{ steps.notes.outputs.path }}
          files: release-assets/*
          # Replace same-named assets when re-publishing a tag.
          make_latest: true

      # Gitee mirror: wipe previous attachments for this tag, then upload.
      # continue-on-error so a slow/failed Gitee sync does not fail the whole Release
      # after GitHub assets are already published.
      - name: Publish Gitee Release
        id: gitee
        if: env.GITEE_TOKEN != ''
        continue-on-error: true
        shell: pwsh
        run: |
          $ver = '${{ needs.meta.outputs.version }}'
          $tag = '${{ needs.meta.outputs.tag }}'
          $files = @(Get-ChildItem -Path release-assets -File | ForEach-Object { $_.FullName })
          if ($files.Count -eq 0) { throw 'No release assets to upload to Gitee' }
          $body = Get-Content -LiteralPath 'release-notes.md' -Raw -Encoding utf8
          ./scripts/publish-gitee-release.ps1 `
            -Tag $tag `
            -Name "QingCode v$ver" `
            -Body $body.Trim() `
            -Files $files

      - name: Gitee publish status
        if: env.GITEE_TOKEN != ''
        shell: pwsh
        run: |
          if ('${{ steps.gitee.outcome }}' -eq 'success') {
            Write-Host 'Gitee release synced.'
          } else {
            Write-Host '::warning::Gitee release sync failed or timed out. GitHub Release is ready; re-run workflow Sync Gitee Release for tag ${{ needs.meta.outputs.tag }}.'
          }

      - name: Gitee token missing
        if: env.GITEE_TOKEN == ''
        run: echo "::warning::GITEE_TOKEN secret is not set; skipped Gitee release upload."
