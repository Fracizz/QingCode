name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build (e.g. v0.1.0). Leave empty to use package.json version and create/update a draft.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      draft: ${{ steps.meta.outputs.draft }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read app version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          CONF=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO=$(grep -E '^version\s*=\s*"' src-tauri/Cargo.toml | head -n1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [[ "$VERSION" != "$CONF" || "$VERSION" != "$CARGO" ]]; then
            echo "Version mismatch: package=$VERSION tauri=$CONF cargo=$CARGO" >&2
            exit 1
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="v${VERSION}"
          fi
          [[ "$TAG" == v* ]] || TAG="v${TAG}"
          if [[ "$TAG" != "v${VERSION}" ]]; then
            echo "Tag $TAG does not match package version v${VERSION}" >&2
            exit 1
          fi
          DRAFT=false
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -z "${{ inputs.tag }}" ]]; then
            DRAFT=true
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "draft=${DRAFT}" >> "$GITHUB_OUTPUT"

  check:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Check (tsc, vitest, rustfmt, clippy, cargo test)
        run: pnpm check

  build-windows-x64:
    needs: [meta, check]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: windows-x64

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build portable exe (x64)
        shell: pwsh
        run: ./scripts/package-exe.ps1 -Force

      - name: Smoke start
        shell: pwsh
        run: ./scripts/smoke-start.ps1 -ExePath release/QingCode.exe -WaitSeconds 4

      - name: Stage artifacts
        shell: pwsh
        run: |
          $ver = '${{ needs.meta.outputs.version }}'
          New-Item -ItemType Directory -Force -Path dist-release | Out-Null
          Copy-Item "release/QingCode_$ver.exe" "dist-release/QingCode_$ver-windows-x64.exe"
          Copy-Item "release/QingCode.exe" "dist-release/QingCode-windows-x64.exe"
          # Keep legacy names for existing download links / docs.
          Copy-Item "release/QingCode_$ver.exe" "dist-release/QingCode_$ver.exe"
          Copy-Item "release/QingCode.exe" "dist-release/QingCode.exe"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist-release/*
          if-no-files-found: error

  build-windows-arm64:
    needs: [meta, check]
    # Public repos only (GitHub-hosted Windows ARM preview).
    runs-on: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: windows-arm64

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build portable exe (arm64)
        shell: pwsh
        run: ./scripts/package-exe.ps1 -Force -Target aarch64-pc-windows-msvc

      - name: Smoke start
        shell: pwsh
        run: ./scripts/smoke-start.ps1 -ExePath release/QingCode-windows-arm64.exe -WaitSeconds 4

      - name: Stage artifacts
        shell: pwsh
        run: |
          $ver = '${{ needs.meta.outputs.version }}'
          New-Item -ItemType Directory -Force -Path dist-release | Out-Null
          Copy-Item "release/QingCode_$ver-windows-arm64.exe" "dist-release/"
          Copy-Item "release/QingCode-windows-arm64.exe" "dist-release/"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm64
          path: dist-release/*
          if-no-files-found: error

  build-macos-arm64:
    needs: [meta, check]
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: macos-arm64

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS arm64 (dmg + app zip)
        run: |
          chmod +x ./scripts/package-macos.sh
          ./scripts/package-macos.sh --force

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          VER='${{ needs.meta.outputs.version }}'
          mkdir -p dist-release
          cp -f "release/QingCode_${VER}-macos-arm64.dmg" dist-release/ || true
          cp -f "release/QingCode-macos-arm64.dmg" dist-release/ || true
          cp -f "release/QingCode_${VER}-macos-arm64.zip" dist-release/ || true
          cp -f "release/QingCode-macos-arm64.zip" dist-release/ || true
          ls -la dist-release
          test -n "$(ls -A dist-release)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist-release/*
          if-no-files-found: error

  publish:
    needs: [meta, build-windows-x64, build-windows-arm64, build-macos-arm64]
    runs-on: windows-latest
    env:
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        shell: pwsh
        run: Get-ChildItem -Recurse release-assets | Format-Table FullName, Length

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: QingCode v${{ needs.meta.outputs.version }}
          draft: ${{ needs.meta.outputs.draft == 'true' }}
          generate_release_notes: true
          body: |
            ## QingCode v${{ needs.meta.outputs.version }}

            ### 中文
            多平台构建（macOS 未签名：首次请右键 → 打开）。

            | 平台 | 文件 |
            |------|------|
            | Windows x64 | `QingCode_${{ needs.meta.outputs.version }}-windows-x64.exe`（兼 `QingCode_${{ needs.meta.outputs.version }}.exe`） |
            | Windows ARM64 | `QingCode_${{ needs.meta.outputs.version }}-windows-arm64.exe` |
            | macOS Apple Silicon | `QingCode_${{ needs.meta.outputs.version }}-macos-arm64.dmg` / `.zip` |

            Windows 需安装 WebView2。变更说明见 [CHANGELOG.md](https://github.com/Fracizz/QingCode/blob/master/CHANGELOG.md)。

            ### English
            Multi-platform builds (unsigned macOS OK — right-click → Open the first time).

            | Platform | File |
            |----------|------|
            | Windows x64 | `QingCode_${{ needs.meta.outputs.version }}-windows-x64.exe` (also `QingCode_${{ needs.meta.outputs.version }}.exe`) |
            | Windows ARM64 | `QingCode_${{ needs.meta.outputs.version }}-windows-arm64.exe` |
            | macOS Apple Silicon | `QingCode_${{ needs.meta.outputs.version }}-macos-arm64.dmg` / `.zip` |

            Requires WebView2 on Windows 10/11. See [CHANGELOG.en.md](https://github.com/Fracizz/QingCode/blob/master/CHANGELOG.en.md).

            Gitee mirror (requires `GITEE_TOKEN`): https://gitee.com/FrancizTest_admin/qing-code/releases
          files: release-assets/*

      - name: Publish Gitee Release
        if: env.GITEE_TOKEN != ''
        shell: pwsh
        run: |
          $ver = '${{ needs.meta.outputs.version }}'
          $tag = '${{ needs.meta.outputs.tag }}'
          $files = Get-ChildItem -Path release-assets -File | ForEach-Object { $_.FullName }
          if ($files.Count -eq 0) { throw 'No release assets to upload to Gitee' }
          $body = @"
          ## QingCode v$ver

          ### 中文
          多平台构建。

          - Windows x64: ``QingCode_$ver-windows-x64.exe`` / ``QingCode_$ver.exe``
          - Windows ARM64: ``QingCode_$ver-windows-arm64.exe``
          - macOS Apple Silicon: ``QingCode_$ver-macos-arm64.dmg`` / ``.zip``

          变更说明：https://gitee.com/FrancizTest_admin/qing-code/blob/master/CHANGELOG.md

          ### English
          Multi-platform builds.

          - Windows x64: ``QingCode_$ver-windows-x64.exe`` / ``QingCode_$ver.exe``
          - Windows ARM64: ``QingCode_$ver-windows-arm64.exe``
          - macOS Apple Silicon: ``QingCode_$ver-macos-arm64.dmg`` / ``.zip``

          Changelog: https://gitee.com/FrancizTest_admin/qing-code/blob/master/CHANGELOG.en.md
          "@
          ./scripts/publish-gitee-release.ps1 `
            -Tag $tag `
            -Name "QingCode v$ver" `
            -Body $body.Trim() `
            -Files $files

      - name: Gitee token missing
        if: env.GITEE_TOKEN == ''
        run: echo "::warning::GITEE_TOKEN secret is not set; skipped Gitee release upload."
