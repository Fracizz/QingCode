name: Sync Gitee Release

# Mirror a GitHub Release (notes + canonical assets) to Gitee. Requires secret GITEE_TOKEN.
# Auto-runs after a successful Release workflow; also available via workflow_dispatch.
on:
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to sync (e.g. v0.1.5). Leave empty to use the latest GitHub Release.'
        required: false
        type: string
        default: ''

permissions:
  contents: read

concurrency:
  # One sync per tag; cancel older in-flight syncs for the same tag.
  group: sync-gitee-${{ github.event.inputs.tag || github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: true

jobs:
  sync:
    # Skip failed / cancelled Release runs (workflow_run). Manual dispatch always runs.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    # Windows: curl.exe + faster uploads to Gitee than ubuntu-latest in practice.
    runs-on: windows-latest
    env:
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require GITEE_TOKEN
        if: env.GITEE_TOKEN == ''
        shell: pwsh
        run: |
          Write-Error 'GITEE_TOKEN secret is not set. Add a Gitee private token under Settings → Secrets and variables → Actions, then re-run this workflow.'
          exit 1

      - name: Resolve tag
        id: meta
        shell: pwsh
        run: |
          . ./scripts/canonical-release-assets.ps1
          $tag = '${{ github.event.inputs.tag }}'.Trim()
          if ('${{ github.event_name }}' -eq 'workflow_run') {
            $head = '${{ github.event.workflow_run.head_branch }}'.Trim()
            # Tag pushes set head_branch to the tag (e.g. v0.1.5). Branch / draft dispatches do not.
            if ($head -notmatch '^v\d') {
              Write-Host "Release head_branch='$head' is not a version tag; skip auto Gitee sync (use workflow_dispatch)."
              "skip=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
              exit 0
            }
            $tag = $head
            Write-Host "Tag from Release head_branch: $tag"
          }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = (gh release list --repo '${{ github.repository }}' --limit 1 --json tagName --jq '.[0].tagName').Trim()
            if ([string]::IsNullOrWhiteSpace($tag)) { throw 'Could not resolve a GitHub Release tag to sync' }
            Write-Host "Tag from latest GitHub Release: $tag"
          }
          if (-not $tag.StartsWith('v')) { $tag = "v$tag" }
          $ver = $tag.Substring(1)
          $notes = "docs/release-notes/$tag.md"
          if (-not (Test-Path -LiteralPath $notes)) { throw "Missing notes file: $notes" }
          "skip=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "notes=$notes" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Download canonical GitHub assets
        if: steps.meta.outputs.skip != 'true'
        shell: pwsh
        run: |
          . ./scripts/canonical-release-assets.ps1
          $tag = '${{ steps.meta.outputs.tag }}'
          $ver = '${{ steps.meta.outputs.version }}'
          $keep = Get-CanonicalReleaseAssetNames -Version $ver
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          foreach ($name in $keep) {
            Write-Host "download $name"
            gh release download $tag --repo '${{ github.repository }}' --dir release-assets --pattern $name
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to download $name from GitHub Release $tag"
            }
          }
          Get-ChildItem release-assets -File | Format-Table Name, Length
          $got = @(Get-ChildItem release-assets -File | ForEach-Object { $_.Name })
          $missing = @($keep | Where-Object { $got -notcontains $_ })
          if ($missing.Count -gt 0) {
            throw "Missing canonical assets on GitHub Release ${tag}: $($missing -join ', ')"
          }

      - name: Publish to Gitee
        if: steps.meta.outputs.skip != 'true'
        shell: pwsh
        run: |
          $tag = '${{ steps.meta.outputs.tag }}'
          $ver = '${{ steps.meta.outputs.version }}'
          $notes = '${{ steps.meta.outputs.notes }}'
          $body = Get-Content -LiteralPath $notes -Raw -Encoding utf8
          $files = @(Get-ChildItem -Path release-assets -File | ForEach-Object { $_.FullName })
          if ($files.Count -eq 0) { throw 'No GitHub release assets downloaded' }
          ./scripts/publish-gitee-release.ps1 `
            -Tag $tag `
            -Name "QingCode v$ver" `
            -Body $body.Trim() `
            -Files ([string[]]$files)
          Write-Host "Synced $tag → https://gitee.com/FrancizTest_admin/qing-code/releases/tag/$tag"
