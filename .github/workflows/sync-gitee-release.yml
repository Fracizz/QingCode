name: Sync Gitee Release

# Mirror a GitHub Release (notes + assets) to Gitee. Requires secret GITEE_TOKEN.
# Manual only — do not auto-run on workflow file pushes (avoids cancelling / double-uploading).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to sync (e.g. v0.1.4)'
        required: true
        type: string
        default: 'v0.1.5'

permissions:
  contents: read

concurrency:
  group: sync-gitee-${{ github.event.inputs.tag }}
  cancel-in-progress: true

jobs:
  sync:
    # Windows: curl.exe + faster uploads to Gitee than ubuntu-latest in practice.
    runs-on: windows-latest
    env:
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require GITEE_TOKEN
        if: env.GITEE_TOKEN == ''
        shell: pwsh
        run: |
          Write-Error 'GITEE_TOKEN secret is not set. Add a Gitee private token under Settings → Secrets and variables → Actions, then re-run this workflow.'
          exit 1

      - name: Resolve tag
        id: meta
        shell: pwsh
        run: |
          $tag = '${{ github.event.inputs.tag }}'
          if ([string]::IsNullOrWhiteSpace($tag)) { $tag = 'v0.1.5' }
          if (-not $tag.StartsWith('v')) { $tag = "v$tag" }
          $ver = $tag.Substring(1)
          $notes = "docs/release-notes/$tag.md"
          if (-not (Test-Path -LiteralPath $notes)) { throw "Missing notes file: $notes" }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "notes=$notes" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Download canonical GitHub assets
        shell: pwsh
        run: |
          $tag = '${{ steps.meta.outputs.tag }}'
          $ver = '${{ steps.meta.outputs.version }}'
          $keep = @(
            "QingCode_${ver}-windows-x64.exe",
            "QingCode_${ver}-windows-x64-setup.exe",
            "QingCode_${ver}-windows-arm64.exe",
            "QingCode_${ver}-windows-arm64-setup.exe",
            "QingCode_${ver}-macos-arm64.dmg",
            "QingCode_${ver}-macos-arm64.zip"
          )
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          foreach ($name in $keep) {
            Write-Host "download $name"
            gh release download $tag --repo '${{ github.repository }}' --dir release-assets --pattern $name
          }
          Get-ChildItem release-assets -File | Format-Table Name, Length
          $got = @(Get-ChildItem release-assets -File | ForEach-Object { $_.Name })
          $missing = @($keep | Where-Object { $got -notcontains $_ })
          if ($missing.Count -gt 0) {
            throw "Missing canonical assets on GitHub Release ${tag}: $($missing -join ', ')"
          }

      - name: Publish to Gitee
        shell: pwsh
        run: |
          $tag = '${{ steps.meta.outputs.tag }}'
          $ver = '${{ steps.meta.outputs.version }}'
          $notes = '${{ steps.meta.outputs.notes }}'
          $body = Get-Content -LiteralPath $notes -Raw -Encoding utf8
          $files = @(Get-ChildItem -Path release-assets -File | ForEach-Object { $_.FullName })
          if ($files.Count -eq 0) { throw 'No GitHub release assets downloaded' }
          ./scripts/publish-gitee-release.ps1 `
            -Tag $tag `
            -Name "QingCode v$ver" `
            -Body $body.Trim() `
            -Files ([string[]]$files)
          Write-Host "Synced $tag → https://gitee.com/FrancizTest_admin/qing-code/releases/tag/$tag"
