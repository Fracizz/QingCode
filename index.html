<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/app-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>QingCode</title>
    <script>
      ;(function () {
        var theme = 'dark'
        try {
          var stored = localStorage.getItem('qingcode:theme')
          if (stored === 'light' || stored === 'dark' || stored === 'forest' || stored === 'auto') theme = stored
        } catch (e) {}
        var resolved =
          theme === 'auto' && window.matchMedia
            ? window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
            : theme === 'auto'
              ? 'dark'
              : theme
        document.documentElement.setAttribute('data-theme', resolved)
        document.documentElement.style.colorScheme = resolved
      })()
    </script>
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #1e1e1e;
        color: #d4d4d4;
      }
      html[data-theme='light'],
      html[data-theme='light'] body,
      html[data-theme='light'] #root {
        background: #f0f0f0;
        color: #1f1f1f;
      }
      html[data-theme='forest'],
      html[data-theme='forest'] body,
      html[data-theme='forest'] #root {
        background: #002626;
        color: #b2c2b0;
      }

      #startup-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1e1e1e;
        transition: opacity 140ms ease, visibility 140ms ease;
      }
      html[data-theme='light'] #startup-splash {
        background: #f0f0f0;
      }
      html[data-theme='forest'] #startup-splash {
        background: #002626;
      }
      #startup-splash.startup-splash--hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .startup-splash-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        user-select: none;
      }
      .startup-logo {
        width: 72px;
        height: 72px;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: startup-logo-in 0.28s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .startup-logo svg {
        display: block;
        width: 72px;
        height: 72px;
        filter: drop-shadow(0 4px 18px rgba(78, 205, 181, 0.22));
      }
      html[data-theme='light'] .startup-logo svg {
        filter: drop-shadow(0 4px 14px rgba(47, 175, 155, 0.18));
      }
      .startup-title {
        font: 600 16px/1 -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
          'Microsoft YaHei', sans-serif;
        letter-spacing: 0.08em;
        color: #d4d4d4;
        animation: startup-fade-up 0.28s 0.04s ease-out both;
      }
      html[data-theme='light'] .startup-title {
        color: #1f1f1f;
      }
      .startup-loader {
        width: 120px;
        height: 3px;
        border-radius: 999px;
        background: rgba(78, 205, 181, 0.14);
        overflow: hidden;
        animation: startup-fade-up 0.28s 0.08s ease-out both;
      }
      html[data-theme='light'] .startup-loader {
        background: rgba(47, 175, 155, 0.16);
      }
      .startup-loader-bar {
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(
          90deg,
          rgba(78, 205, 181, 0),
          #4ecdb5 38%,
          #2faf9b 62%,
          rgba(47, 175, 155, 0)
        );
        animation: startup-loader-slide 1.1s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
      }
      .startup-hint {
        margin: -8px 0 0;
        font: 400 12px/1 -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
          'Microsoft YaHei', sans-serif;
        letter-spacing: 0.12em;
        color: rgba(212, 212, 212, 0.45);
        animation: startup-fade-up 0.28s 0.1s ease-out both;
      }
      html[data-theme='light'] .startup-hint {
        color: rgba(31, 31, 31, 0.42);
      }
      @keyframes startup-logo-in {
        from {
          opacity: 0;
          transform: translateY(4px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      @keyframes startup-fade-up {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes startup-loader-slide {
        0% {
          transform: translateX(-115%);
        }
        100% {
          transform: translateX(320%);
        }
      }
    </style>
  </head>

  <body>
    <div id="startup-splash" aria-hidden="true">
      <div class="startup-splash-inner">
        <div class="startup-logo" aria-hidden="true">
          <!-- Inline logo avoids a startup fetch; paintStartupSplashLogo() may refresh later. -->
          <svg id="startup-logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" width="72" height="72">
            <path fill="#2FAF9B" d="M96 379H416V419H96V379Z"/>
            <path fill="#4ECDB5" d="M96 339H416V379H96V339Z"/>
            <path id="startup-logo-bracket" fill="#F3F6F8" d="M124 93H264L388 197L264 301H124L288 197L124 93Z"/>
          </svg>
        </div>
        <div class="startup-title">QingCode</div>
        <div class="startup-loader" role="status" aria-label="加载中">
          <span class="startup-loader-bar"></span>
        </div>
        <p class="startup-hint">正在启动</p>
      </div>
    </div>
    <div id="root"></div>
    <script>
      ;(function () {
        if (document.documentElement.getAttribute('data-theme') === 'light') {
          var bracket = document.getElementById('startup-logo-bracket')
          if (bracket) bracket.setAttribute('fill', '#2A3539')
        }
      })()
    </script>
    <script>
      ;(function () {
        // Show as soon as splash markup is in the DOM. Size repair happens in Rust while hidden.
        function showWindow() {
          var tauri = window.__TAURI__
          var win = tauri && tauri.window && tauri.window.getCurrentWindow
            ? tauri.window.getCurrentWindow()
            : null
          if (win && win.show) {
            void win.show()
            return
          }
          if (tauri && tauri.core && tauri.core.invoke) {
            void tauri.core.invoke('plugin:window|show')
          }
        }
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', showWindow)
        } else {
          showWindow()
        }
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
